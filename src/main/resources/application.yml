spring:
  application:
    name: auction-platform
  
  # Base default settings (assumes local development testing)
  datasource:
    url: jdbc:postgresql://localhost:5432/auctiondb
    username: postgres
    password: ${DB_PASSWORD}
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
